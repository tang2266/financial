                    { id: 26, from: '🌺花朵', fromQty: 4, to: '🧪魔法藥水', toQty: 1 }, { id: 27, from: '🕸️蜘蛛網', fromQty: 3, to: '🐍蛇', toQty: 2 }, { id: 28, from: '🐝蜜蜂', fromQty: 2, to: '🐸青蛙', toQty: 1 }, { id: 29, from: '🦋蝴蝶', fromQty: 5, to: '🕸️蜘蛛網', toQty: 1 }, { id: 30, from: '🦇蝙蝠翼', fromQty: 3, to: '🍄蘑菇', toQty: 4 }
                ]
            }
        ];

        let barterState = {
            gridMode: 0,
            currentRound: 0,
            gameState: 'modeSelect', 
            timeLeft: 180,
            inventory: {},
            path: [], 
            scores: [],
            msg: ''
        };
        let barterTimer = null;

        function getOptimalForMode(levelIndex, modeLimit) {
            const level = LEVELS[levelIndex];
            const trades = level.trades.slice(0, modeLimit); 
            let maxTargetQty = 0;
            let bestPath = [];

            function dfs(currentItem, currentQty, currentPath, usedTrades) {
                if (currentItem === level.targetItem) {
                    if (currentQty > maxTargetQty) {
                        maxTargetQty = currentQty;
                        bestPath = [...currentPath];
                    }
                    return; 
                }

                const possibleTrades = trades.filter(t => t.from === currentItem && !usedTrades.has(t.id));

                for (let t of possibleTrades) {
                    let gained = (currentQty / t.fromQty) * t.toQty;
                    usedTrades.add(t.id);
                    currentPath.push(t.id);
                    dfs(t.to, gained, currentPath, usedTrades);
                    currentPath.pop();
                    usedTrades.delete(t.id);
                }
            }

            dfs(level.startItem, level.startQty, [], new Set());
            return {
                qty: Math.round(maxTargetQty * 100) / 100,
                path: bestPath
            };
        }

        window.selectBarterMode = function(size) {
            barterState.gridMode = size;
            barterState.currentRound = 0;
            barterState.scores = [];
            barterState.path = [];
            barterState.gameState = 'start';
            barterState.msg = '';
            
            LEVELS.forEach((lvl, idx) => {
                const opt = getOptimalForMode(idx, size);
                lvl.currentOptimalQty = opt.qty;
                lvl.currentOptimalPath = opt.path;
            });
            
            renderBarterUI();
            lucide.createIcons();
        };

        function startBarterTimer() {
            clearInterval(barterTimer);
            barterTimer = setInterval(() => {
                if (barterState.gameState === 'playing' && barterState.timeLeft > 0) {
                    barterState.timeLeft--;
                    updateBarterTimerUI();
                    if (barterState.timeLeft === 0) {
                        endBarterRound('時間到！');
                    }
                } else {
                    clearInterval(barterTimer);
                }
            }, 1000);
        }

        function updateBarterTimerUI() {
            const timerContainer = document.getElementById('barter-timer-container');
            const timerText = document.getElementById('barter-timer-text');
            if (!timerContainer) return;

            const m = Math.floor(barterState.timeLeft / 60);
            const s = (barterState.timeLeft % 60).toString().padStart(2, '0');
            timerText.innerText = `${m}:${s}`;

            if (barterState.timeLeft <= 30) {
                timerContainer.className = 'flex items-center font-bold px-2 py-1 rounded-full bg-red-100 text-red-600 animate-pulse text-sm';
            } else {
                timerContainer.className = 'flex items-center font-bold px-2 py-1 rounded-full bg-blue-100 text-blue-600 text-sm';
            }
        }

        function recalculateInventory() {
            const level = LEVELS[barterState.currentRound];
            let currentInv = {};
            currentInv[level.startItem] = level.startQty;

            barterState.path.forEach(tradeId => {
                const trade = level.trades.find(t => t.id === tradeId);
                const currentQty = currentInv[trade.from] || 0;
                if (currentQty > 0) {
                    let gained = (currentQty / trade.fromQty) * trade.toQty;
                    currentInv[trade.from] = 0; 
                    currentInv[trade.to] = (currentInv[trade.to] || 0) + gained;
                }
            });

            for (let key in currentInv) {
                currentInv[key] = Math.round(currentInv[key] * 100) / 100;
            }
            barterState.inventory = currentInv;
        }

        function getPathString(pathArray, level) {
            if (!pathArray || pathArray.length === 0) return "<span class='text-gray-400 text-sm'>無交易紀錄</span>";
            
            let currentQty = level.startQty;
            
            return pathArray.map(id => {
                const tr = level.trades.find(t => t.id === id);
                let gained = (currentQty / tr.fromQty) * tr.toQty;
                gained = Math.round(gained * 100) / 100;
                
                const stepHtml = `
                    <div class="inline-flex flex-col items-center bg-white px-2 py-1 rounded border border-gray-300 shadow-sm">
                        <div class="text-xs font-bold text-gray-700 flex items-center">
                            ${tr.from} <i data-lucide="arrow-right" class="w-3 h-3 mx-1 text-blue-500"></i> ${tr.to}
                        </div>
                        <div class="flex items-center gap-1 mt-1 pt-1 border-t border-gray-100 w-full justify-between text-[10px]">
                            <span class="text-gray-500 bg-gray-50 px-1 rounded" title="交換比例">比例 ${tr.fromQty}:${tr.toQty}</span>
                            <span class="text-green-600 font-bold bg-green-50 px-1 rounded" title="此步驟換得數量">得 ${gained}</span>
                        </div>
                    </div>`;
                
                currentQty = gained; 
                return stepHtml;
            }).join('<i data-lucide="arrow-right" class="w-4 h-4 text-gray-400 flex-shrink-0 mx-0.5"></i>');
        }

        window.startBarterGame = function() {
            barterState.gameState = 'playing';
            barterState.timeLeft = 180;
            barterState.path = [];
            recalculateInventory();
            barterState.msg = '請點擊網格選擇路徑。雙擊可取消。';
            renderBarterUI();
            lucide.createIcons();
            startBarterTimer();
        };

        window.handleBarterTrade = function(tradeId) {
            if(barterState.gameState !== 'playing') return;
            
            if (barterState.path.includes(tradeId)) {
                barterState.msg = '⚠️ 商人只能交易一次喔！';
                renderBarterUI();
                lucide.createIcons();
                return;
            }

            const level = LEVELS[barterState.currentRound];
            const trade = level.trades.find(t => t.id === tradeId);
            const currentQty = barterState.inventory[trade.from] || 0;

            if (currentQty > 0) {
                barterState.path.push(tradeId);
                recalculateInventory();
                barterState.msg = `已將 ${trade.from} 換成 ${trade.to}！`;

                if ((barterState.inventory[level.targetItem] || 0) > 0) {
                    renderBarterUI();
                    lucide.createIcons();
                    setTimeout(() => {
                        endBarterRound('🛑 換到目標物了！交易強制結束。');
                    }, 50); 
                    return;
                }
            } else {
                barterState.msg = `背包沒有 ${trade.from} 可交換喔！`;
            }
            renderBarterUI();
            lucide.createIcons();
        };

        window.undoTrade = function(tradeId) {
            if(barterState.gameState !== 'playing') return;
            const index = barterState.path.lastIndexOf(tradeId);
            if (index !== -1) {
                barterState.path = barterState.path.slice(0, index);
                recalculateInventory();
                barterState.msg = `已退回至此步驟！`;
                renderBarterUI();
                lucide.createIcons();
            }
        };

        window.revertToStep = function(index) {
            if(barterState.gameState !== 'playing') return;
            barterState.path = barterState.path.slice(0, index);
            recalculateInventory();
            barterState.msg = `已退回到指定的步驟！`;
            renderBarterUI();
            lucide.createIcons();
        };

        window.endBarterRound = function(reason = '') {
            clearInterval(barterTimer);
            barterState.gameState = 'roundEnd';
            const level = LEVELS[barterState.currentRound];
            const targetQty = barterState.inventory[level.targetItem] || 0;
            
            let diff = level.currentOptimalQty - targetQty; 
            diff = Math.round(diff * 100) / 100;
            const actualDiff = diff < 0 ? 0 : diff; 
            
            barterState.scores.push(actualDiff);

            } else if (barterState.gameState === 'start') {

            else if (barterState.gameState === 'playing') {
                let inventoryHtml = '';

                for (const [item, qty] of Object.entries(barterState.inventory)) {

                        inventoryHtml += `<div class="bg-white border-2 border-green-300 px-2 py-1 rounded font-bold text-xs flex items-center shadow-sm text-gray-700">${item} <span class="ml-1 text-green-700 text-sm">x ${qty}</span></div>`;

                if (!hasItems) inventoryHtml = `<span class="text-gray-400 text-sm">背包空空如也...</span>`;

                let pathHtml = barterState.path.map((id, idx) => {
                    const tr = level.trades.find(t=>t.id===id);
                    return `<span ondblclick="revertToStep(${idx})" class="no-select inline-flex items-center text-[10px] font-bold px-2 py-1 bg-white border border-blue-400 rounded-full shadow-sm text-blue-700 cursor-pointer hover:bg-red-50 hover:border-red-400 hover:text-red-600 transition-colors" title="雙擊可取消此步與後續交易">${tr.from} <i data-lucide="arrow-right" class="w-3 h-3 mx-1 text-blue-500"></i> ${tr.to}</span>`;
                }).join('<i data-lucide="arrow-right" class="w-4 h-4 text-gray-400 mx-0.5 font-bold"></i>');

                if (barterState.path.length === 0) pathHtml = '<span class="text-xs text-gray-500">尚無交易，請點擊下方網格。</span>';

                    if (isUsed) {

                    }

                    tradesHtml += `

                        <div class="flex flex-wrap gap-1.5 mb-2 bg-green-50/50 p-2 rounded-lg border border-green-100 min-h-[40px]">

                            <h4 class="font-bold text-blue-800 text-xs mb-1 flex items-center"><i data-lucide="map" class="w-3 h-3 mr-1"></i>你的路徑 (雙擊倒退)：</h4>
                            <div class="flex flex-wrap gap-1 items-center">
                                ${pathHtml}
                            </div>

                        <div class="${gridClass}">
                            ${tradesHtml}
                        </div>

                        <div class="flex items-center justify-between mt-2">
                            <span class="text-blue-600 font-bold text-xs">${barterState.msg}</span>
                            <button onclick="endBarterRound('玩家提前結算！')" class="bg-gray-800 hover:bg-gray-900 text-white px-4 py-1.5 rounded-lg font-bold shadow-md text-sm">
                                結算
                            </button>
                        </div>
                    </div>
                `;
            }
            else if (barterState.gameState === 'roundEnd') {
                const targetQty = barterState.inventory[level.targetItem] || 0;
                const myPathStr = getPathString(barterState.path, level);
                const optPathStr = getPathString(level.currentOptimalPath, level); 

                html += `
                    <div class="text-center py-6 bg-yellow-50 rounded-lg border border-yellow-200">
                        <h3 class="text-lg font-bold mb-3 whitespace-pre-line">${barterState.msg}</h3>
                        
                        <div class="mt-4 text-left bg-white p-3 rounded-lg border border-yellow-300 shadow-sm w-full max-w-3xl mx-auto overflow-x-auto">
                            <h4 class="font-bold text-gray-800 mb-2 flex items-center text-sm"><i data-lucide="map-pin" class="w-4 h-4 mr-1 text-blue-500"></i> 路徑比較</h4>
                            
                            <div class="mb-3 bg-gray-50 p-2 rounded border border-gray-200">
                                <div class="text-xs text-gray-600 mb-2 font-bold">👤 你獲得：<span class="text-blue-600 text-base">${targetQty}</span></div>
                                <div class="flex flex-wrap items-center gap-y-2 gap-x-1">${myPathStr}</div>
                            </div>
                            
                            <div class="bg-yellow-100/50 p-2 rounded border border-yellow-400">
                                <div class="text-xs text-yellow-700 mb-2 font-bold">🌟 最佳目標：<span class="text-red-600 text-base">${level.currentOptimalQty}</span></div>

                        </button>
                    </div>

            }
            else if (barterState.gameState === 'gameOver') {
                html += `
                    <div class="text-center py-6 bg-blue-50 rounded-lg border border-blue-200">
                        <i data-lucide="award" class="w-12 h-12 text-yellow-500 mx-auto mb-2"></i>
                        <h3 class="text-2xl font-bold mb-2">遊戲結束！</h3>
                        <p class="text-lg mb-4">你的總失分：<strong class="text-red-600 text-2xl">${Math.round(totalScore*10)/10}</strong> 分</p>
                        <button onclick="resetBarterGame()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-full shadow-md">
                            再挑戰一次
                        </button>
                    </div>
                `;
            }

            html += generateTeacherTip("引導討論：\n1. 【目標陷阱】一旦換到目標物，交易就會強制結束！這告訴我們理財必須『先放大本金』後，再去做最終兌換。\n2. 【比例的魔法】先算出單價再乘上數量是很重要的數學能力。\n3. 【路徑規劃】現實中的理財規劃，需要看長遠的路線，有時候繞遠路反而賺得更多！");
            html += `</div>`;
            document.getElementById('app-main').innerHTML = html;
        }


        // ==========================================
        // 關卡二：貨幣交易 (定價與需求法則)
        // ==========================================
        const PRICING_MAX_TURNS = 20;
        
        function getRandomCost() {
            return Math.floor(Math.random() * 41) + 30; 
        }

        let pricingState = {
            turn: 1,
            history: [],
            gameState: 'playing',
            totalProfit: 0,
            guess: null,
            cost: getRandomCost()
        };

        window.handlePricingSell = function() {
            const priceInput = document.getElementById('pricing-input');
            const errorMsg = document.getElementById('pricing-error');
            const price = parseInt(priceInput.value);

            if (isNaN(price) || price < 0) {
                errorMsg.classList.remove('hidden');
                return;
            }
            errorMsg.classList.add('hidden');

            let demand = Math.floor(200 - 1.5 * price); 
            if (demand < 0) demand = 0;

            const profit = demand * (price - pricingState.cost);

            pricingState.history.unshift({ turn: pricingState.turn, price, demand, profit });
            pricingState.totalProfit += profit;

            if (pricingState.turn >= PRICING_MAX_TURNS) {
                pricingState.gameState = 'guessing';
            } else {
                pricingState.turn++;
            }

            renderPricingUI();
            lucide.createIcons();
            
            if (pricingState.gameState === 'playing') {
                const input = document.getElementById('pricing-input');
                if(input) input.focus();
            } else if (pricingState.gameState === 'guessing') {
                const guessInput = document.getElementById('pricing-guess-input');
                if(guessInput) guessInput.focus();
            }
        };

        window.handlePricingEnter = function(event) {
            if (event.key === 'Enter') {
                handlePricingSell();
            }
        };

        window.handlePricingGuess = function() {
            const guessInput = document.getElementById('pricing-guess-input');
            const guess = parseInt(guessInput.value);

            if (isNaN(guess) || guess < 0) {
                alert("請輸入有效的正整數售價！");
                return;
            }

            pricingState.guess = guess;
            pricingState.gameState = 'end';
            renderPricingUI();
            lucide.createIcons();
        };

        window.handlePricingGuessEnter = function(event) {
            if (event.key === 'Enter') {
                handlePricingGuess();
            }
        };

        // 新增：處理玩家提前確定最佳售價並結束遊戲的邏輯
        window.handleEarlyGuess = function() {
            const guessInput = document.getElementById('early-guess-input');
            const guess = parseInt(guessInput.value);

            if (isNaN(guess) || guess < 0) {
                alert("請輸入有效的正整數售價！");
                return;
            }

            pricingState.guess = guess;
            pricingState.gameState = 'end'; // 提早進入結算畫面
            renderPricingUI();
            lucide.createIcons();
        };

        window.resetPricingGame = function() {
            pricingState = {
                turn: 1,
                history: [],
                gameState: 'playing',
                totalProfit: 0,
                guess: null,
                cost: getRandomCost() 
            };
            renderPricingUI();
            lucide.createIcons();
        };

        function generatePricingChart() {
            if (pricingState.history.length === 0) return '';
            
            const maxPrice = pricingState.cost * 3.5;
            const maxDemand = 200; 

            const sortedHistory = [...pricingState.history].sort((a,b) => b.price - a.price); 
            
            let linesHtml = '';
            for (let i = 0; i < sortedHistory.length - 1; i++) {
                const h1 = sortedHistory[i];
                const h2 = sortedHistory[i+1];
                const x1 = (h1.demand / maxDemand) * 100 + '%';
                const y1 = 100 - (h1.price / maxPrice) * 100 + '%';
                const x2 = (h2.demand / maxDemand) * 100 + '%';
                const y2 = 100 - (h2.price / maxPrice) * 100 + '%';
                linesHtml += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#9ca3af" stroke-width="2" stroke-dasharray="4,4" />`;
            }

            let maxDemandRecord = pricingState.history[0];
            pricingState.history.forEach(h => {
                if (h.demand > maxDemandRecord.demand) maxDemandRecord = h;
            });
            
            let pointsHtml = '';
            pricingState.history.forEach(h => {
                const cx = (h.demand / maxDemand) * 100 + '%'; 
                const cy = 100 - (h.price / maxPrice) * 100 + '%';
                
                let maxHighlight = '';
                if (h === maxDemandRecord) {
                    maxHighlight = `
                        <circle cx="${cx}" cy="${cy}" r="6" fill="none" stroke="#ef4444" stroke-width="2" class="animate-pulse"></circle>
                        <text x="${cx}" y="${cy}" dx="10" dy="-4" font-size="10" fill="#ef4444" font-weight="bold">最多數量</text>
                    `;
                }

                pointsHtml += `
                    ${maxHighlight}
                    <g class="group cursor-pointer">
                        <circle cx="${cx}" cy="${cy}" r="3" fill="#f97316" class="opacity-80 hover:opacity-100 transition-all cursor-pointer"></circle>
                        <text x="${cx}" y="${cy}" dx="6" dy="-6" font-size="9" fill="#333" class="hidden group-hover:block bg-white border border-gray-200 px-1 font-bold z-10">
                            P:${h.price}, D:${h.demand}
                        </text>
                    </g>
                `;
            });

            let overlayHtml = '';
            if (pricingState.gameState === 'end' && pricingState.guess !== null) {
                const optPrice = Math.round((200 + 1.5 * pricingState.cost) / 3);
                const optDemand = Math.max(0, Math.floor(200 - 1.5 * optPrice)); 

                const guessCy = 100 - (pricingState.guess / maxPrice) * 100 + '%';
                const optCx = (optDemand / maxDemand) * 100 + '%'; 
                const optCy = 100 - (optPrice / maxPrice) * 100 + '%';
                
                overlayHtml = `
                    <line x1="${optCx}" y1="100%" x2="${optCx}" y2="${optCy}" stroke="#22c55e" stroke-width="2" stroke-dasharray="3,3" />
                    <line x1="0%" y1="${optCy}" x2="${optCx}" y2="${optCy}" stroke="#22c55e" stroke-width="2" stroke-dasharray="3,3" />
                    <circle cx="${optCx}" cy="${optCy}" r="4" fill="#22c55e" />
                    
                    <rect x="${optCx}" y="${optCy}" transform="translate(3, 3)" width="75" height="16" fill="white" opacity="0.8" rx="2"/>
                    <text x="${optCx}" y="${optCy}" dx="6" dy="14" font-size="10" fill="#22c55e" font-weight="bold">最佳 $${optPrice}</text>
                    
                    <rect x="${optCx}" y="100%" transform="translate(-65, -20)" width="60" height="16" fill="white" opacity="0.8" rx="2"/>
                    <text x="${optCx}" y="100%" dx="-60" dy="-9" font-size="10" fill="#22c55e" font-weight="bold">需求 ${optDemand}</text>
                    
                    <line x1="0%" y1="${guessCy}" x2="100%" y2="${guessCy}" stroke="#3b82f6" stroke-width="2" />
                    <rect x="2" y="${guessCy}" transform="translate(0, -20)" width="75" height="16" fill="white" opacity="0.8" rx="2"/>
                    <text x="5" y="${guessCy}" dy="-8" font-size="10" fill="#3b82f6" font-weight="bold">你的 $${pricingState.guess}</text>
                `;
            }

            return `
                <div class="relative w-full max-w-[280px] aspect-square bg-gray-50 border-l-2 border-b-2 border-gray-400 mt-2 mx-auto mb-4">
                    <span class="absolute -left-10 top-0 text-[10px] text-gray-500 rotate-90 origin-left">售價 ($)</span>
                    <span class="absolute bottom-[-18px] right-0 text-[10px] text-gray-500">需求量 (件)</span>
                    
                    <svg class="w-full h-full overflow-visible">
                        <text x="-4" y="0%" dy="3" font-size="9" fill="#888" text-anchor="end">${Math.round(maxPrice)}</text>
                        <text x="-4" y="25%" dy="3" font-size="9" fill="#888" text-anchor="end">${Math.round(maxPrice * 0.75)}</text>
                        <text x="-4" y="50%" dy="3" font-size="9" fill="#888" text-anchor="end">${Math.round(maxPrice * 0.5)}</text>
                        <text x="-4" y="75%" dy="3" font-size="9" fill="#888" text-anchor="end">${Math.round(maxPrice * 0.25)}</text>
                        <text x="-4" y="100%" dy="3" font-size="9" fill="#888" text-anchor="end">0</text>
                        
                        <text x="25%" y="100%" dy="12" font-size="9" fill="#888" text-anchor="middle">50</text>
                        <text x="50%" y="100%" dy="12" font-size="9" fill="#888" text-anchor="middle">100</text>
                        <text x="75%" y="100%" dy="12" font-size="9" fill="#888" text-anchor="middle">150</text>
                        <text x="100%" y="100%" dy="12" font-size="9" fill="#888" text-anchor="middle">200</text>

                        ${linesHtml}
                        ${overlayHtml}
                        ${pointsHtml}
                    </svg>
                </div>
            `;
        }

        function renderPricingUI() {
            let historyHtml = '';
            if (pricingState.history.length === 0) {
                historyHtml = `<div class="text-center text-gray-400 mt-6 text-sm">尚無銷售紀錄</div>`;
            } else {
                pricingState.history.forEach(h => {
                    const profitClass = h.profit > 0 ? 'text-green-600' : 'text-red-600';
                    const profitSign = h.profit > 0 ? '+' : '';
                    historyHtml += `
                        <div class="grid grid-cols-4 text-center text-xs p-1.5 bg-gray-50 rounded mb-1">
                            <span class="text-gray-500">#${h.turn}</span>
                            <span class="font-bold">$${h.price}</span>
                            <span>${h.demand} 件</span>
                            <span class="${profitClass} font-bold">${profitSign}$${h.profit}</span>
                        </div>
                    `;
                });
            }

            const currentTurnDisplay = pricingState.turn > PRICING_MAX_TURNS ? PRICING_MAX_TURNS : pricingState.turn;

            let controlPanelHtml = '';
            if (pricingState.gameState === 'playing') {
                controlPanelHtml = `
                    <div class="bg-white p-3 rounded-lg border shadow-sm">
                        <label class="block text-xs font-bold text-gray-700 mb-2">本次售價 ($)：</label>
                        <input 
                            type="number" 
                            id="pricing-input"
                            onkeydown="handlePricingEnter(event)"
                            class="w-full border-2 border-gray-300 rounded p-1.5 mb-2 focus:border-orange-500 focus:outline-none text-base"
                            placeholder="例如: 80"
                        />
                        <p id="pricing-error" class="text-red-500 text-xs hidden mb-2 font-bold">請輸入正整數！</p>
                        <button 
                            onclick="handlePricingSell()"
                            class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-1.5 rounded shadow-sm text-sm transition-colors"
                        >
                            決定定價並販售
                        </button>

                        <hr class="my-4 border-gray-200" />
                        
                        <div class="bg-blue-50/50 p-2 rounded border border-blue-100">
                            <label class="block text-xs font-bold text-blue-800 mb-2">最佳售價 ($)：</label>
                            <input 
                                type="number" 
                                id="early-guess-input"
                                class="w-full border-2 border-blue-300 rounded p-1.5 mb-2 focus:border-blue-500 focus:outline-none text-base font-bold text-blue-800"
                                placeholder="輸入最佳售價"
                            />
                            <button 
                                onclick="handleEarlyGuess()"
                                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-1.5 rounded shadow-sm text-sm transition-colors"
                            >
                                我已經確定最佳售價
                            </button>
                        </div>
                    </div>
                `;
            } else if (pricingState.gameState === 'guessing') {
                controlPanelHtml = `
                    <div class="bg-blue-50 p-3 rounded-lg border border-blue-200 shadow-sm animate-pulse" style="animation-iteration-count: 2;">
                        <h3 class="font-bold text-blue-800 mb-1 text-base">🎯 營業結束！</h3>
                        <p class="text-xs text-gray-700 mb-3">推測能賺取最大總利潤的最佳定價：</p>
                        <input 
                            type="number" 
                            id="pricing-guess-input"
                            onkeydown="handlePricingGuessEnter(event)"
                            class="w-full border-2 border-blue-300 rounded p-1.5 mb-3 focus:border-blue-500 focus:outline-none text-base font-bold text-blue-800"
                            placeholder="推測最佳定價"
                        />
                        <button 
                            onclick="handlePricingGuess()"
                            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded shadow-sm text-sm transition-colors"
                        >
                            送出並看結果
                        </button>
                    </div>
                `;
            } else if (pricingState.gameState === 'end') {
                const optPrice = Math.round((200 + 1.5 * pricingState.cost) / 3);
                const diff = Math.abs(pricingState.guess - optPrice);
                const isWin = diff <= 2;
                const resultColor = isWin ? 'green' : 'red';
                const icon = isWin ? 'check-circle-2' : 'x-circle';
                const title = isWin ? '🎉 挑戰成功！' : '🤔 差了一點！';

                controlPanelHtml = `
                    <div class="bg-${resultColor}-50 p-3 rounded-lg border border-${resultColor}-300 text-center shadow-sm">
                        <i data-lucide="${icon}" class="w-8 h-8 text-${resultColor}-600 mx-auto mb-1"></i>
                        <h3 class="font-bold text-${resultColor}-800 text-lg">${title}</h3>
                        <div class="mt-2 text-left bg-white p-2 rounded border border-${resultColor}-200 shadow-inner text-sm">
                            <p class="mb-1 text-gray-700">測試次數：<strong class="text-orange-600">${pricingState.history.length} 次</strong></p>
                            <p class="mb-1 text-gray-700">你的定價：<strong class="text-blue-600">$${pricingState.guess}</strong></p>
                            <p class="mb-1 text-gray-700">系統最佳定價：<strong class="text-green-600">$${optPrice}</strong></p>
                            <p class="text-xs mt-2 font-bold text-gray-500 border-t pt-1">誤差：<span class="${isWin ? 'text-green-600' : 'text-red-500'}">$${diff}</span> (需在2元以內)</p>
                        </div>
                        <button onclick="resetPricingGame()" class="mt-3 w-full bg-gray-800 hover:bg-gray-900 text-white py-2 rounded-lg font-bold text-sm transition-colors">重新挑戰</button>
                    </div>
                `;
            }

            let chartSectionHtml = '';
            if (pricingState.gameState === 'end') {
                chartSectionHtml = `
                    <div class="bg-white border rounded-lg p-3 shadow-sm mb-3">
                        <h3 class="font-bold text-center text-sm mb-2 flex justify-center items-center">
                            <i data-lucide="bar-chart-3" class="w-4 h-4 mr-1 text-blue-500"></i> 需求法則分析圖
                        </h3>
                        ${generatePricingChart()}
                    </div>
                `;
            }

            let html = `
                <div class="p-4 bg-white rounded-xl shadow-sm">
                    <div class="border-b pb-2 mb-2">
                        <h2 class="text-xl font-bold text-orange-600 flex items-center"><i data-lucide="trending-up" class="w-5 h-5 mr-2"></i> 貨幣交易：找出最佳定價</h2>
                        <p class="text-gray-600 mt-1 text-sm">固定成本為 <strong class="text-red-500">$${pricingState.cost}</strong>。請在 ${PRICING_MAX_TURNS} 次銷售機會中測試售價，找出最大利潤！</p>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="md:col-span-1 space-y-3">
                            <div class="bg-orange-50 p-3 rounded-lg border border-orange-100">
                                <h3 class="font-bold text-sm mb-1 text-orange-800">狀態 (${currentTurnDisplay}/${PRICING_MAX_TURNS})</h3>
                                <p class="flex justify-between text-sm">總利潤： <strong class="text-green-600">$${pricingState.totalProfit.toLocaleString()}</strong></p>
                                <p class="flex justify-between text-sm">成本： <strong>$${pricingState.cost} / 件</strong></p>
                            </div>
                            ${controlPanelHtml}
                        </div>

                        <div class="md:col-span-2 space-y-3">
                            ${chartSectionHtml}
                            <div class="bg-white border rounded-lg shadow-sm overflow-hidden h-48 flex flex-col">
                                <div class="bg-gray-100 px-3 py-1.5 font-bold text-xs grid grid-cols-4 border-b text-center">
                                    <span>次數</span>
                                    <span>售價</span>
                                    <span>需求量</span>
                                    <span>利潤</span>
                                </div>
                                <div class="overflow-y-auto flex-1 p-1">
                                    ${historyHtml}
                                </div>
                            </div>
                        </div>
                    </div>
                    ${generateTeacherTip("引導討論：\n1. 【需求法則】觀察散佈圖，呈現『左上到右下』的斜線，證明『需求法則』：價格越低，需求量越多。\n2. 【最佳定價】利潤最大化的『黃金定價點』並不是交易數量最多的地方喔！")}
                </div>
            `;
            document.getElementById('app-main').innerHTML = html;
        }

        window.onload = () => {
            switchTab(1);
        };

    </script>
</body>
</html>
